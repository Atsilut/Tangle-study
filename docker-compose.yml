name: tangle

x-dotnet-env: &dotnet-env
  DOTNET_CLI_HOME: /tmp/dotnet-cli
  NUGET_PACKAGES: /tmp/nuget-packages
  DOTNET_NOLOGO: "1"
  ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=tangledb;Username=tangle;Password=tangletangle123;Pooling=true"
  Redis__Enabled: "false"
  Redis__ConnectionString: "redis:6379"
  Redis__InstanceName: "tangle:"
  Redis__SignalRChannelPrefix: "tangle:signalr:"
  Redis__WorkQueueStreamPrefix: "tangle:queue:"

services:
  redis:
    image: redis:8.8-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.35.0
    restart: unless-stopped
    command: azurite --blobHost 0.0.0.0 --location /data
    ports:
      - "10000:10000"
    volumes:
      - azurite-data:/data

  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tangle
      POSTGRES_PASSWORD: tangletangle123
      POSTGRES_DB: tangledb
    ports:
      - "5433:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tangle -d tangledb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: services/Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=tangledb;Username=tangle;Password=tangletangle123;Pooling=true"
      Redis__Enabled: "true"
      Redis__ConnectionString: "redis:6379"
      Redis__InstanceName: "tangle:"
      Redis__SignalRChannelPrefix: "tangle:signalr:"
      Redis__WorkQueueStreamPrefix: "tangle:queue:"
      Media__Enabled: "true"
      Media__ConnectionString: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLmF5gPCXx4scIIpCimMY4evDMb2v50pPsdZ1Oi4K;BlobEndpoint=http://azurite:10000/devstoreaccount1;"
      Media__PublicBlobEndpoint: "http://127.0.0.1:10000/devstoreaccount1"
      Media__ContainerName: "tangle-media"
      Media__WorkerCallbackSecret: "dev-media-worker-secret"
    ports:
      - "5000:8080"
    depends_on:
      azurite:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Build, EF migrations, and other dotnet CLI work (no local .nuget / .dotnet-tools).
  sdk:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: docker/Dockerfile.sdk
    image: tangle-sdk:local
    working_dir: /src
    environment: *dotnet-env
    volumes:
      - .:/src
    depends_on:
      db:
        condition: service_healthy

  rust-worker:
    profiles: ["workers"]
    build:
      context: .
      dockerfile: workers/rust-worker/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      WORKER_STREAM_PREFIX: "tangle:queue:"
      WORKER_STREAM_KEY: chat.message.created
      WORKER_CONSUMER_GROUP: tangle-workers
      RUST_LOG: info
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  rust-worker-media:
    profiles: ["workers"]
    build:
      context: .
      dockerfile: workers/rust-worker/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      WORKER_STREAM_PREFIX: "tangle:queue:"
      WORKER_STREAM_KEY: media.uploaded
      WORKER_CONSUMER_GROUP: tangle-workers
      API_BASE_URL: http://api:8080
      WORKER_CALLBACK_SECRET: dev-media-worker-secret
      AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLmF5gPCXx4scIIpCimMY4evDMb2v50pPsdZ1Oi4K;BlobEndpoint=http://azurite:10000/devstoreaccount1;"
      MEDIA_CONTAINER_NAME: tangle-media
      RUST_LOG: info
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
      azurite:
        condition: service_started
    restart: unless-stopped

  test:
    profiles: ["test"]
    image: tangle-sdk:local
    build:
      context: .
      dockerfile: docker/Dockerfile.sdk
    working_dir: /src
    environment:
      <<: *dotnet-env
      DOCKER_HOST: unix:///var/run/docker.sock
      # Testcontainers talks to the host Docker engine via the mounted socket.
      TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: /var/run/docker.sock
      TESTCONTAINERS_HOST_OVERRIDE: host.docker.internal
      TESTCONTAINERS_RYUK_DISABLED: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/src
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      [
        "test",
        "services/Api.Tests/Api.Tests.csproj",
        "-c",
        "Release",
        "--verbosity",
        "normal",
      ]

volumes:
  azurite-data:
  db-data:
  redis-data:
