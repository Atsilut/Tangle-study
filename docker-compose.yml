name: tangle

x-dotnet-env: &dotnet-env
  DOTNET_CLI_HOME: /tmp/dotnet-cli
  NUGET_PACKAGES: /tmp/nuget-packages
  DOTNET_NOLOGO: "1"
  ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=tangledb;Username=tangle;Password=tangletangle123;Pooling=true"
  Redis__Enabled: "false"
  Redis__ConnectionString: "redis:6379"
  Redis__InstanceName: "tangle:"
  Redis__SignalRChannelPrefix: "tangle:signalr:"

services:
  redis:
    image: redis:8.8-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tangle
      POSTGRES_PASSWORD: tangletangle123
      POSTGRES_DB: tangledb
    ports:
      - "5433:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tangle -d tangledb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: services/Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=tangledb;Username=tangle;Password=tangletangle123;Pooling=true"
      Redis__Enabled: "true"
      Redis__ConnectionString: "redis:6379"
      Redis__InstanceName: "tangle:"
      Redis__SignalRChannelPrefix: "tangle:signalr:"
    ports:
      - "5000:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Build, EF migrations, and other dotnet CLI work (no local .nuget / .dotnet-tools).
  sdk:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: docker/Dockerfile.sdk
    image: tangle-sdk:local
    working_dir: /src
    environment: *dotnet-env
    volumes:
      - .:/src
    depends_on:
      db:
        condition: service_healthy

  test:
    profiles: ["test"]
    image: tangle-sdk:local
    build:
      context: .
      dockerfile: docker/Dockerfile.sdk
    working_dir: /src
    environment:
      <<: *dotnet-env
      DOCKER_HOST: unix:///var/run/docker.sock
      # Testcontainers talks to the host Docker engine via the mounted socket.
      TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: /var/run/docker.sock
      TESTCONTAINERS_HOST_OVERRIDE: host.docker.internal
      TESTCONTAINERS_RYUK_DISABLED: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/src
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      [
        "test",
        "services/Api.Tests/Api.Tests.csproj",
        "-c",
        "Release",
        "--verbosity",
        "normal",
      ]

volumes:
  db-data:
  redis-data:
