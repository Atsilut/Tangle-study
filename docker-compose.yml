name: tangle

x-dotnet-env: &dotnet-env
  DOTNET_CLI_HOME: /tmp/dotnet-cli
  NUGET_PACKAGES: /tmp/nuget-packages
  DOTNET_NOLOGO: "1"
  ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=tangledb;Username=tangle;Password=tangletangle123;Pooling=true"
  Redis__Enabled: "false"
  Redis__ConnectionString: "redis:6379"
  Redis__InstanceName: "tangle:"
  Redis__SignalRChannelPrefix: "tangle:signalr:"
  Redis__WorkQueueStreamPrefix: "tangle:queue:"

services:
  redis:
    image: redis:8.8-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.35.0
    restart: unless-stopped
    command: azurite --blobHost 0.0.0.0 --location /data
    ports:
      - "10000:10000"
    volumes:
      - azurite-data:/data

  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tangle
      POSTGRES_PASSWORD: tangletangle123
      POSTGRES_DB: tangledb
    ports:
      - "5433:5432"
    volumes:
      - db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tangle -d tangledb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: services/Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
      Redis__InstanceName: "tangle:"
      Redis__SignalRChannelPrefix: "tangle:signalr:"
      Redis__WorkQueueStreamPrefix: "tangle:queue:"
      Metrics__RequireAuth: "true"
      Metrics__Secret: "dev-metrics-secret"
    ports:
      - "5000:8080"
    depends_on:
      azurite:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  prometheus:
    profiles: ["monitoring"]
    image: prom/prometheus:v3.4.2
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/recording_rules.yml:/etc/prometheus/recording_rules.yml:ro
      - ./infra/prometheus/scrape/workers.yml:/etc/prometheus/scrape-src/workers.yml:ro
      - ./infra/prometheus/docker-entrypoint.sh:/etc/prometheus/docker-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/etc/prometheus/docker-entrypoint.sh"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    depends_on:
      postgres-exporter:
        condition: service_started
      redis-exporter:
        condition: service_started
      rust-worker:
        condition: service_started
        required: false
      rust-worker-media:
        condition: service_started
        required: false

  postgres-exporter:
    profiles: ["monitoring"]
    image: prometheuscommunity/postgres-exporter:v0.16.0
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://tangle:tangletangle123@db:5432/tangledb?sslmode=disable
    depends_on:
      db:
        condition: service_healthy

  redis-exporter:
    profiles: ["monitoring"]
    image: oliver006/redis_exporter:v1.67.0
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis:6379
    depends_on:
      redis:
        condition: service_healthy

  grafana:
    profiles: ["monitoring"]
    image: grafana/grafana:11.6.1
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

  # Build, EF migrations, and other dotnet CLI work (no local .nuget / .dotnet-tools).
  sdk:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: docker/Dockerfile.sdk
    image: tangle-sdk:local
    working_dir: /src
    environment: *dotnet-env
    volumes:
      - .:/src
    depends_on:
      db:
        condition: service_healthy

  rust-worker:
    profiles: ["workers"]
    build:
      context: .
      dockerfile: workers/rust-worker/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      WORKER_STREAM_PREFIX: "tangle:queue:"
      WORKER_STREAM_KEY: chat.message.created
      WORKER_CONSUMER_GROUP: tangle-workers
      WORKER_METRICS_PORT: "9090"
      RUST_LOG: info
    expose:
      - "9090"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  rust-worker-media:
    profiles: ["workers", "harness"]
    build:
      context: .
      dockerfile: workers/rust-worker/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      WORKER_STREAM_PREFIX: "tangle:queue:"
      WORKER_STREAM_KEY: media.uploaded
      WORKER_CONSUMER_GROUP: tangle-workers
      API_BASE_URL: http://api:8080
      WORKER_CALLBACK_SECRET: dev-media-worker-secret
      AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;"
      MEDIA_CONTAINER_NAME: tangle-media
      WORKER_METRICS_PORT: "9090"
      RUST_LOG: info
    expose:
      - "9090"
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
      azurite:
        condition: service_started
    restart: unless-stopped

  harness:
    profiles: ["harness"]
    image: tangle-sdk:local
    build:
      context: .
      dockerfile: docker/Dockerfile.sdk
    working_dir: /src
    environment:
      <<: *dotnet-env
      TANGLE_HARNESS_API_BASE_URL: http://api:8080
    volumes:
      - .:/src
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      azurite:
        condition: service_started
      api:
        condition: service_healthy
      rust-worker-media:
        condition: service_started
    command:
      [
        "test",
        "services/Api.Tests/Api.Tests.csproj",
        "-c",
        "Release",
        "--filter",
        "Category=Harness",
        "--verbosity",
        "normal",
      ]

  test:
    profiles: ["test"]
    image: tangle-sdk:local
    build:
      context: .
      dockerfile: docker/Dockerfile.sdk
    working_dir: /src
    environment:
      <<: *dotnet-env
      DOCKER_HOST: unix:///var/run/docker.sock
      # Testcontainers talks to the host Docker engine via the mounted socket.
      TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: /var/run/docker.sock
      TESTCONTAINERS_HOST_OVERRIDE: host.docker.internal
      TESTCONTAINERS_RYUK_DISABLED: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/src
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      [
        "test",
        "services/Api.Tests/Api.Tests.csproj",
        "-c",
        "Release",
        "--verbosity",
        "normal",
      ]

volumes:
  azurite-data:
  db-data:
  redis-data:
