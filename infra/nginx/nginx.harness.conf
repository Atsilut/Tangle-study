# Nginx edge for media harness E2E (minimal stack: gateway + users + media).
# Built via docker-compose.harness.yml (NGINX_CONF build arg).

upstream tangle_gateway {
    server gateway:8080;
}

upstream tangle_azurite {
    server azurite:10000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://tangle_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 512m;
    }

    location /hubs/ {
        proxy_pass http://tangle_gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # /internal/* is service-to-service only (direct on the private network); not proxied at the edge.

    location /devstoreaccount1/ {
        proxy_pass http://tangle_azurite/devstoreaccount1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_request_buffering off;
        client_max_body_size 512m;
    }

    location = /health {
        proxy_pass http://tangle_gateway;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
