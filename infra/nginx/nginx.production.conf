# Nginx edge for Tangle on Azure (or any production host without Azurite).
# Browser uploads go directly to Azure Blob via SAS URLs returned by the API.
#
# Upstream hostname must match the API Container App name in the same environment
# (default: api:8080). Override at container start with TANGLE_API_UPSTREAM if needed.
#
# Copied into the web image when clients/web/Dockerfile is built with
# --build-arg NGINX_CONF=nginx.production.conf

upstream tangle_api {
    server api:8080;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 32m;

    # REST API
    location /api/ {
        proxy_pass http://tangle_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SignalR hub — requires WebSocket upgrade headers.
    location /hubs/ {
        proxy_pass http://tangle_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # Edge health passthrough (Container Apps may probe API directly instead).
    location = /health {
        proxy_pass http://tangle_api;
        proxy_connect_timeout 10s;
        proxy_read_timeout 15s;
        proxy_send_timeout 15s;
    }

    # SPA fallback for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
