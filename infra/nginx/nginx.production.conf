# Nginx edge for Tangle (Azure Container Apps / prod).
# Selected via Dockerfile build-arg NGINX_CONF in clients/web/Dockerfile,
# set by scripts/cd/azure-cd-build-push.sh (tangle-study-web build args).
# Copied into the image as /etc/nginx/templates/default.conf.template;
# docker-entrypoint.sh renders it with envsubst at container start.
#
#   - local Compose: infra/nginx/nginx.conf (default NGINX_CONF, no envsubst vars)
#   - Azure/prod:    this file (NGINX_CONF=infra/nginx/nginx.production.conf)
#
# TANGLE_API_UPSTREAM / TANGLE_API_HOST are injected as Container App env vars
# (see infra/azure/parameters.prod.json -> containerApps.tangle-study-web.env).
# Only these two are passed to envsubst; all other $vars below are native
# nginx variables and must NOT use ${...} syntax or envsubst will blank them.

upstream tangle_api {
    server ${TANGLE_API_UPSTREAM};
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 32m;

    # REST API
    location /api/ {
        proxy_pass http://tangle_api;
        proxy_http_version 1.1;
        proxy_set_header Host ${TANGLE_API_HOST};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SignalR hub — requires WebSocket upgrade headers.
    location /hubs/ {
        proxy_pass http://tangle_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host ${TANGLE_API_HOST};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # Health passthrough (used by scripts/cd/azure-cd-smoke.sh).
    location = /health {
        proxy_pass http://tangle_api;
        proxy_http_version 1.1;
        proxy_set_header Host ${TANGLE_API_HOST};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # SPA fallback for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}