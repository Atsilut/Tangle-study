# Nginx edge for Tangle: reverse-proxies the API and (in prod) serves the
# built React SPA. Bind-mounted into a stock nginx image by docker-compose
# (the `nginx` service, `web` profile).
#
#   - dev:  the Vite dev server proxies /api and /hubs here
#           (VITE_PROXY_TARGET=http://localhost:8080); Vite serves the SPA.
#   - prod: mount clients/web/dist to serve the SPA from here too.
#
# "api" resolves via the Docker Compose network (service name).

upstream tangle_api {
    server api:8080;
}

upstream tangle_azurite {
    server azurite:10000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # REST API
    location /api/ {
        proxy_pass http://tangle_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SignalR hub — requires WebSocket upgrade headers.
    location /hubs/ {
        proxy_pass http://tangle_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # Local Azurite blob uploads (browser same-origin; see media/api.ts).
    location /devstoreaccount1/ {
        proxy_pass http://tangle_azurite/devstoreaccount1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_request_buffering off;
        client_max_body_size 512m;
    }

    # Health + Swagger passthrough (handy in dev).
    location = /health {
        proxy_pass http://tangle_api;
    }

    location /swagger/ {
        proxy_pass http://tangle_api;
    }

    # SPA fallback for client-side routing (prod, when dist is mounted).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
