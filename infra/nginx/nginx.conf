# Nginx edge for Tangle: serves the built React SPA and proxies API/hubs to the gateway.
# Copied into the web client image by clients/web/Dockerfile (the `nginx` service).
#
#   - /api/*, /hubs/*, /internal/* (when exposed) → gateway:8080
#   - Azure/prod:   infra/nginx/nginx.production.conf (build-arg NGINX_CONF)
#
#   - dev:  the Vite dev server proxies /api and /hubs here
#           (VITE_PROXY_TARGET=http://localhost:8080); Vite serves the SPA.
#   - prod: the Docker image serves the SPA from /usr/share/nginx/html.

upstream tangle_gateway {
    server gateway:8080;
}

upstream tangle_azurite {
    server azurite:10000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # REST API + SignalR + internal routes — gateway owns path routing and JWT validation.
    location /api/ {
        proxy_pass http://tangle_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 512m;
    }

    location /hubs/ {
        proxy_pass http://tangle_gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    location /internal/ {
        proxy_pass http://tangle_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Local Azurite blob uploads (browser same-origin; see media/api.ts).
    location /devstoreaccount1/ {
        proxy_pass http://tangle_azurite/devstoreaccount1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_request_buffering off;
        client_max_body_size 512m;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
