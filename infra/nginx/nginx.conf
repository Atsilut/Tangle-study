# Nginx edge for Tangle: reverse-proxies the API and serves the built React SPA.
# Copied into the web client image by clients/web/Dockerfile (the `nginx` service).
#
#   - /api/media/* and /internal/media/* → media-service (strangler)
#   - /api/chat/*, group chat-rooms, /internal/chat/*, /hubs/chat → chat-service (strangler)
#   - /api/groups/*, invitations, applications, /internal/group/* → group-service (strangler)
#   - other /api/* and /hubs/* → monolith api
#   - Azure/prod:   infra/nginx/nginx.production.conf (build-arg NGINX_CONF)
#
#   - dev:  the Vite dev server proxies /api and /hubs here
#           (VITE_PROXY_TARGET=http://localhost:8080); Vite serves the SPA.
#   - prod: the Docker image serves the SPA from /usr/share/nginx/html.
#
# "api" resolves via the Docker Compose network (service name).

upstream tangle_api {
    server api:8080;
}

upstream tangle_media {
    server media:8080;
}

upstream tangle_chat {
    server chat:8080;
}

upstream tangle_location {
    server location:8080;
}

upstream tangle_community {
    server community:8080;
}

upstream tangle_group {
    server group:8080;
}

upstream tangle_azurite {
    server azurite:10000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Media service (strangler) — must precede the generic /api/ block.
    location /api/media/ {
        proxy_pass http://tangle_media;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 512m;
    }

    location /internal/media/ {
        proxy_pass http://tangle_media;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Chat service (strangler) — must precede generic /api/ and /hubs/ blocks.
    location /api/chat/ {
        proxy_pass http://tangle_chat;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 32m;
    }

    location ~ ^/api/groups/[0-9]+/chat-rooms {
        proxy_pass http://tangle_chat;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /internal/chat/ {
        proxy_pass http://tangle_chat;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /hubs/chat {
        proxy_pass http://tangle_chat;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # Location service (strangler) — must precede generic /api/ and /hubs/ blocks.
    location /api/location/ {
        proxy_pass http://tangle_location;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /internal/location/ {
        proxy_pass http://tangle_location;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /hubs/location {
        proxy_pass http://tangle_location;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # Community service (posts + comments) — must precede generic /api/ block.
    location /api/posts {
        proxy_pass http://tangle_community;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/comments {
        proxy_pass http://tangle_community;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/api/groups/[0-9]+/boards/[0-9]+/posts {
        proxy_pass http://tangle_community;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /internal/community {
        proxy_pass http://tangle_community;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Group service — must follow more-specific board-posts and chat-rooms regexes above.
    location /api/groups {
        proxy_pass http://tangle_group;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/invitations {
        proxy_pass http://tangle_group;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/applications {
        proxy_pass http://tangle_group;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /internal/group {
        proxy_pass http://tangle_group;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # REST API (monolith)
    location /api/ {
        proxy_pass http://tangle_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SignalR hub — requires WebSocket upgrade headers.
    location /hubs/ {
        proxy_pass http://tangle_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # Local Azurite blob uploads (browser same-origin; see media/api.ts).
    location /devstoreaccount1/ {
        proxy_pass http://tangle_azurite/devstoreaccount1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_request_buffering off;
        client_max_body_size 512m;
    }

    # Health + Swagger passthrough (handy in dev).
    location = /health {
        proxy_pass http://tangle_api;
    }

    location /swagger/ {
        proxy_pass http://tangle_api;
    }

    # SPA fallback for client-side routing (prod, when dist is mounted).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
