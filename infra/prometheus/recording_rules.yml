groups:
  - name: tangle_services
    interval: 15s
    rules:
      - record: tangle:services_request_rate
        expr: sum(rate(http_requests_received_total{job=~"users|media|chat|location|community|group|social"}[5m]))

      - record: tangle:services_5xx_ratio
        expr: |
          sum(rate(http_requests_received_total{job=~"users|media|chat|location|community|group|social", code=~"5.."}[5m]))
          /
          sum(rate(http_requests_received_total{job=~"users|media|chat|location|community|group|social"}[5m]))

      - record: tangle:services_other_4xx_ratio
        expr: |
          sum(rate(http_requests_received_total{job=~"users|media|chat|location|community|group|social", code=~"4..", code!~"401|403|409"}[5m]))
          /
          sum(rate(http_requests_received_total{job=~"users|media|chat|location|community|group|social"}[5m]))

      - record: tangle:services_5xx_rate_by_controller
        expr: sum by (controller, job) (rate(http_requests_received_total{job=~"users|media|chat|location|community|group|social", code=~"5.."}[5m]))

      - record: tangle:services_request_duration_p95
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=~"users|media|chat|location|community|group|social"}[5m])) by (le))
