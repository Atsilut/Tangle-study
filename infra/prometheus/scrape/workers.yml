scrape_configs:
  - job_name: rust-worker-chat
    static_configs:
      - targets: ["rust-worker-chat:9090"]
    metrics_path: /metrics

  - job_name: rust-worker-media
    static_configs:
      - targets: ["rust-worker-media:9090"]
    metrics_path: /metrics

  - job_name: rust-worker-location
    static_configs:
      - targets: ["rust-worker-location:9090"]
    metrics_path: /metrics
