global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/recording_rules.yml

scrape_configs:
  - job_name: api
    static_configs:
      - targets: ["api:8080"]
    metrics_path: /metrics
    http_headers:
      X-Metrics-Secret:
        values:
          - dev-metrics-secret

  - job_name: rust-worker-chat
    static_configs:
      - targets: ["rust-worker:9090"]
    metrics_path: /metrics

  - job_name: rust-worker-media
    static_configs:
      - targets: ["rust-worker-media:9090"]
    metrics_path: /metrics

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]
