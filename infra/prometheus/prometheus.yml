global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api
    static_configs:
      - targets: ["api:8080"]
    metrics_path: /metrics

  - job_name: rust-worker-chat
    static_configs:
      - targets: ["rust-worker:9090"]
    metrics_path: /metrics

  - job_name: rust-worker-media
    static_configs:
      - targets: ["rust-worker-media:9090"]
    metrics_path: /metrics
