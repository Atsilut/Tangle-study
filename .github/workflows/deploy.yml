name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

  workflow_dispatch:
    inputs:
      skip_migrate:
        type: boolean
        default: false

concurrency:
  group: prod-deploy
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write

env:
  COMPOSE_ENV_FILE: docker/versions.prod.env

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: prod

    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')

    steps:

    # ==================================================
    # 0. RESOLVE DEPLOY TARGET
    # ==================================================
    - name: Resolve deploy meta
      id: meta
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
        else
          echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
        fi

        owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
        registry="${{ vars.CONTAINER_REGISTRY }}"

        if [[ -z "$registry" ]]; then
          registry="ghcr.io/${owner}/tangle-study"
        fi

        echo "registry=${registry}" >> "$GITHUB_OUTPUT"

    - uses: actions/checkout@v7
      with:
        ref: ${{ steps.meta.outputs.sha }}

    - name: Load runtime versions
      run: grep -E '^[A-Z_]+=' docker/versions.prod.env >> "$GITHUB_ENV"

    # ==================================================
    # 1. GHCR LOGIN
    # ==================================================
    - name: Login to GHCR
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # ==================================================
    # 2. BUILD & PUSH
    # ==================================================
    - name: Build & push images
      env:
        CONTAINER_REGISTRY: ${{ steps.meta.outputs.registry }}
        IMAGE_TAG: ${{ steps.meta.outputs.sha }}
      run: bash scripts/azure-cd-build-push.sh

    # ==================================================
    # 3. GHCR CONSISTENCY GATE (CRITICAL FIX)
    # ==================================================
    - name: Wait for GHCR image propagation
      env:
        CONTAINER_REGISTRY: ${{ steps.meta.outputs.registry }}
        IMAGE_TAG: ${{ steps.meta.outputs.sha }}
      run: bash scripts/azure-cd-wait-image.sh

    # ==================================================
    # 4. AZURE LOGIN
    # ==================================================
    - name: Azure login (OIDC)
      uses: azure/login@v3
      with:
        client-id: ${{ vars.AZURE_CLIENT_ID }}
        tenant-id: ${{ vars.AZURE_TENANT_ID }}
        subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

    # ==================================================
    # 5. INFRA (REDIS FIRST)
    # ==================================================
    - name: Ensure Redis (early)
      env:
        AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
        REDIS_ENSURE_PHASE: early
      run: bash scripts/azure-cd-ensure-redis.sh

    # ==================================================
    # 6. SECRETS
    # ==================================================
    - name: Inject secrets
      env:
        AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
        BLOB_CONNECTION_STRING: ${{ secrets.BLOB_CONNECTION_STRING }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        WORKER_CALLBACK_SECRET: ${{ secrets.WORKER_CALLBACK_SECRET }}
        METRICS_SCRAPE_SECRET: ${{ secrets.METRICS_SCRAPE_SECRET }}
        POSTGRES_CONNECTION_STRING: ${{ secrets.POSTGRES_CONNECTION_STRING }}
        GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        PLACES_API_KEY: ${{ secrets.PLACES_API_KEY }}
        APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}
        GHCR_REGISTRY_USERNAME: ${{ secrets.GHCR_REGISTRY_USERNAME }}
        GHCR_REGISTRY_PASSWORD: ${{ secrets.GHCR_REGISTRY_PASSWORD }}
      run: bash scripts/azure-cd-inject-secrets.sh

    # ==================================================
    # 7. DEPLOY IMAGES (ACA UPDATE)
    # ==================================================
    - name: Update Container Apps images
      env:
        AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
        CONTAINER_REGISTRY: ${{ steps.meta.outputs.registry }}
        IMAGE_TAG: ${{ steps.meta.outputs.sha }}
      run: bash scripts/azure-cd-update-images.sh

    # ==================================================
    # 8. RUNTIME RECONCILIATION
    # ==================================================
    - name: Ensure API/Web runtime
      env:
        AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      run: bash scripts/azure-cd-ensure-api-web-runtime.sh

    # ==================================================
    # 9. MIGRATION
    # ==================================================
    - name: Run EF migrate
      if: github.event_name == 'workflow_run' || inputs.skip_migrate != true
      env:
        AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      run: bash scripts/azure-cd-migrate.sh

    # ==================================================
    # 10. SMOKE TEST
    # ==================================================
    - name: Smoke tests
      env:
        AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      run: bash scripts/azure-cd-smoke.sh

    # ==================================================
    # 11. SUMMARY
    # ==================================================
    - name: Deploy summary
      run: |
        echo "========================================"
        echo "[DEPLOY][SUCCESS]"
        echo "========================================"
        echo "registry=${{ steps.meta.outputs.registry }}"
        echo "tag=${{ steps.meta.outputs.sha }}"
        echo "rg=${{ vars.AZURE_RESOURCE_GROUP }}"