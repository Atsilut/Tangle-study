name: CI-v1

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  COMPOSE_ENV_FILE: docker/versions.prod.env
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  changes:
    name: Detect changed paths
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      rust: ${{ steps.filter.outputs.rust }}
      harness: ${{ steps.filter.outputs.harness }}
    steps:

      ############################################
      # 0. CHECKOUT
      ############################################
      - name: Checkout
        uses: actions/checkout@v7

      ############################################
      # 1. PATH FILTER
      ############################################
      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'services/**'
              - 'docker/Dockerfile.sdk'
              - 'docker-compose.yml'
              - 'scripts/ci/**'
              - 'scripts/shared/**'
              - 'Tangle.slnx'
            web:
              - 'clients/web/**'
            rust:
              - 'workers/**'
            harness:
              - 'services/Api.Tests/Harness/**'
              - 'services/Media/**'
              - 'services/Api/Client/**'
              - 'infra/nginx/**'
              - 'workers/**'
              - 'docker-compose.harness.yml'
              - 'docker-compose.yml'
              - 'scripts/ci/run-media-harness.sh'
              - 'scripts/ci/**'

  rust:
    name: Rust worker tests
    needs: [changes]
    if: |
      always() && (
        github.event_name != 'pull_request' ||
        needs.changes.outputs.rust == 'true' ||
        needs.changes.outputs.harness == 'true'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:

      ############################################
      # 0. CHECKOUT
      ############################################
      - name: Checkout
        uses: actions/checkout@v7

      ############################################
      # 1. RENDER VERSIONS
      ############################################
      - name: Render pinned container versions
        run: bash scripts/ci/render-versions-env.sh "${{ env.COMPOSE_ENV_FILE }}"

      ############################################
      # 2. LOAD VERSIONS
      ############################################
      - name: Load pinned container versions
        run: grep -E '^[A-Z_]+=' "${{ env.COMPOSE_ENV_FILE }}" >> "$GITHUB_ENV"

      ############################################
      # 3. CACHE CARGO
      ############################################
      - name: Cache Cargo build artifacts
        uses: actions/cache@v5
        with:
          path: |
            .ci-cache/cargo/registry
            .ci-cache/cargo/git
            workers/target
          key: ${{ runner.os }}-cargo-${{ env.RUST_IMAGE }}-${{ hashFiles('workers/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ env.RUST_IMAGE }}-
            ${{ runner.os }}-cargo-

      ############################################
      # 4. RUST TESTS
      ############################################
      - name: Run Rust worker tests
        run: |
          mkdir -p .ci-cache/cargo/registry .ci-cache/cargo/git workers/target
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:/src" \
            -v "${{ github.workspace }}/.ci-cache/cargo/registry:/usr/local/cargo/registry" \
            -v "${{ github.workspace }}/.ci-cache/cargo/git:/usr/local/cargo/git" \
            -v "${{ github.workspace }}/workers/target:/src/workers/target" \
            -w /src/workers \
            "${{ env.RUST_IMAGE }}" \
            cargo test --workspace
          bash scripts/ci/libs/ci-cache.sh

  web:
    name: Web lint, test, build
    needs: [changes]
    if: |
      always() && (
        github.event_name != 'pull_request' ||
        needs.changes.outputs.web == 'true'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:

      ############################################
      # 0. CHECKOUT
      ############################################
      - name: Checkout
        uses: actions/checkout@v7

      ############################################
      # 1. RENDER VERSIONS
      ############################################
      - name: Render pinned container versions
        run: bash scripts/ci/render-versions-env.sh "${{ env.COMPOSE_ENV_FILE }}"

      ############################################
      # 2. LOAD VERSIONS
      ############################################
      - name: Load pinned container versions
        run: grep -E '^[A-Z_]+=' "${{ env.COMPOSE_ENV_FILE }}" >> "$GITHUB_ENV"

      ############################################
      # 3. CACHE NPM
      ############################################
      - name: Cache npm and web test build
        uses: actions/cache@v5
        with:
          path: |
            .ci-cache/npm
            clients/web/node_modules
          key: ${{ runner.os }}-npm-${{ env.NODE_IMAGE }}-${{ hashFiles('clients/web/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-${{ env.NODE_IMAGE }}-
            ${{ runner.os }}-npm-

      ############################################
      # 4. WEB LINT, TEST, BUILD
      ############################################
      - name: Run web lint, test, and build
        run: |
          mkdir -p .ci-cache/npm
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e npm_config_cache=/npm-cache \
            -v "${{ github.workspace }}:/src" \
            -v "${{ github.workspace }}/.ci-cache/npm:/npm-cache" \
            -w /src/clients/web \
            "${{ env.NODE_IMAGE }}" \
            sh -c "npm ci --no-audit --no-fund && npm run lint && npm run test && npm run build"
          bash scripts/ci/libs/ci-cache.sh

  api:
    name: API integration tests
    needs: [changes]
    if: |
      always() && (
        github.event_name != 'pull_request' ||
        needs.changes.outputs.api == 'true'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:

      ############################################
      # 0. CHECKOUT
      ############################################
      - name: Checkout
        uses: actions/checkout@v7

      ############################################
      # 1. RENDER VERSIONS
      ############################################
      - name: Render pinned container versions
        run: bash scripts/ci/render-versions-env.sh "${{ env.COMPOSE_ENV_FILE }}"

      ############################################
      # 2. LOAD VERSIONS
      ############################################
      - name: Load pinned container versions
        run: grep -E '^[A-Z_]+=' "${{ env.COMPOSE_ENV_FILE }}" >> "$GITHUB_ENV"

      ############################################
      # 3. CACHE NUGET
      ############################################
      - name: Cache NuGet and .NET build outputs
        uses: actions/cache@v5
        with:
          path: |
            .ci-cache/nuget
            services/Api/bin
            services/Api/obj
            services/Api.Tests/bin
            services/Api.Tests/obj
            services/Media/bin
            services/Media/obj
            services/Media.Tests/bin
            services/Media.Tests/obj
          key: ${{ runner.os }}-dotnet-${{ env.DOTNET_SDK_IMAGE }}-${{ hashFiles('**/*.csproj', 'docker/Dockerfile.sdk') }}
          restore-keys: |
            ${{ runner.os }}-dotnet-${{ env.DOTNET_SDK_IMAGE }}-
            ${{ runner.os }}-dotnet-

      ############################################
      # 4. DOCKER BUILDX
      ############################################
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      ############################################
      # 5. API INTEGRATION TESTS
      ############################################
      - name: Run API integration tests
        run: |
          mkdir -p .ci-cache/nuget
          bash scripts/ci/docker-test.sh

  harness:
    name: Media harness E2E
    needs: [changes]
    if: |
      always() && (
        github.event_name != 'pull_request' ||
        needs.changes.outputs.harness == 'true'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:

      ############################################
      # 0. CHECKOUT
      ############################################
      - name: Checkout
        uses: actions/checkout@v7

      ############################################
      # 1. RENDER VERSIONS
      ############################################
      - name: Render pinned container versions
        run: bash scripts/ci/render-versions-env.sh "${{ env.COMPOSE_ENV_FILE }}"

      ############################################
      # 2. LOAD VERSIONS
      ############################################
      - name: Load pinned container versions
        run: grep -E '^[A-Z_]+=' "${{ env.COMPOSE_ENV_FILE }}" >> "$GITHUB_ENV"

      ############################################
      # 3. CACHE NUGET
      ############################################
      - name: Cache NuGet and .NET build outputs
        uses: actions/cache@v5
        with:
          path: |
            .ci-cache/nuget
            services/Api/bin
            services/Api/obj
            services/Api.Tests/bin
            services/Api.Tests/obj
            services/Media/bin
            services/Media/obj
            services/Media.Tests/bin
            services/Media.Tests/obj
          key: ${{ runner.os }}-dotnet-${{ env.DOTNET_SDK_IMAGE }}-${{ hashFiles('**/*.csproj', 'docker/Dockerfile.sdk') }}
          restore-keys: |
            ${{ runner.os }}-dotnet-${{ env.DOTNET_SDK_IMAGE }}-
            ${{ runner.os }}-dotnet-

      ############################################
      # 4. DOCKER BUILDX
      ############################################
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      ############################################
      # 5. MEDIA HARNESS E2E
      ############################################
      - name: Run media harness E2E
        run: |
          mkdir -p .ci-cache/nuget
          bash scripts/ci/run-media-harness.sh

  ci-gate:
    name: CI
    needs: [changes, rust, web, api, harness]
    if: always()
    runs-on: ubuntu-latest
    steps:

      ############################################
      # 0. CI GATE
      ############################################
      - name: Fail if any job failed or was cancelled
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "========================================"
          echo "[CI][FAILURE] One or more jobs failed or were cancelled"
          echo "========================================"
          exit 1
