name: CI-v1

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  COMPOSE_ENV_FILE: docker/versions.prod.env
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      dotnet-api: ${{ steps.filter.outputs.dotnet-api }}
      dotnet-media: ${{ steps.filter.outputs.dotnet-media }}
      dotnet-chat: ${{ steps.filter.outputs.dotnet-chat }}
      dotnet-location: ${{ steps.filter.outputs.dotnet-location }}
      dotnet-community: ${{ steps.filter.outputs.dotnet-community }}
      dotnet-group: ${{ steps.filter.outputs.dotnet-group }}
      dotnet-social: ${{ steps.filter.outputs.dotnet-social }}
      dotnet-shared: ${{ steps.filter.outputs.dotnet-shared }}
      web: ${{ steps.filter.outputs.web }}
      rust: ${{ steps.filter.outputs.rust }}
      harness: ${{ steps.filter.outputs.harness }}
    steps:

      ############################################
      # 0. CHECKOUT
      ############################################
      - name: Checkout
        uses: actions/checkout@v7

      ############################################
      # 1. PATH FILTER
      ############################################
      - name: Detect changed paths
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            dotnet-api:
              - 'services/Gateway/**'
              - 'services/Users/**'
              - 'services/Users.Tests/**'
              - 'services/Api/**'
              - 'services/Api.Tests/**'
            dotnet-media:
              - 'services/Media/**'
              - 'services/Media.Tests/**'
            dotnet-chat:
              - 'services/Chat/**'
              - 'services/Chat.Tests/**'
            dotnet-location:
              - 'services/Location/**'
              - 'services/Location.Tests/**'
            dotnet-community:
              - 'services/Community/**'
              - 'services/Community.Tests/**'
            dotnet-group:
              - 'services/Group/**'
              - 'services/Group.Tests/**'
            dotnet-social:
              - 'services/Social/**'
              - 'services/Social.Tests/**'
            dotnet-shared:
              - 'docker/Dockerfile.sdk'
              - 'docker-compose.yml'
              - 'docker-compose.runtime.yml'
              - 'docker-compose.harness.yml'
              - 'docker/versions.prod.env'
              - 'scripts/ci/**'
              - 'scripts/shared/**'
              - 'Tangle.slnx'
              - 'Directory.Build.props'
              - '.github/workflows/**'
              - 'infra/azure/parameters.prod.json'
            web:
              - 'clients/web/**'
            rust:
              - 'workers/**'
            harness:
              - 'services/Gateway/**'
              - 'services/Users/**'
              - 'services/Api.Tests/Fixtures/Harness/**'
              - 'services/Api.Tests/Harness/**'
              - 'services/Api/**'
              - 'services/Media/**'
              - 'services/Chat/**'
              - 'services/Location/**'
              - 'services/Community/**'
              - 'infra/nginx/**'
              - 'workers/**'
              - 'clients/web/Dockerfile'
              - 'docker-compose.harness.yml'
              - 'docker-compose.runtime.yml'
              - 'docker-compose.yml'
              - 'scripts/ci/run-media-harness.sh'
              - 'scripts/ci/compose-build-stack.sh'
              - 'scripts/ci/load-compose-stack.sh'
              - 'scripts/ci/**'

  dotnet-build:
    name: .NET publish and test build
    needs: [changes]
    if: |
      always() && (
        github.event_name != 'pull_request' ||
        needs.changes.outputs.dotnet-api == 'true' ||
        needs.changes.outputs.dotnet-media == 'true' ||
        needs.changes.outputs.dotnet-chat == 'true' ||
        needs.changes.outputs.dotnet-location == 'true' ||
        needs.changes.outputs.dotnet-community == 'true' ||
        needs.changes.outputs.dotnet-group == 'true' ||
        needs.changes.outputs.dotnet-social == 'true' ||
        needs.changes.outputs.dotnet-shared == 'true' ||
        needs.changes.outputs.harness == 'true'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:

      ############################################
      # 0. CHECKOUT
      ############################################
      - name: Checkout
        uses: actions/checkout@v7

      ############################################
      # 1. RENDER VERSIONS
      ############################################
      - name: Render pinned container versions
        run: bash scripts/ci/render-versions-env.sh "${{ env.COMPOSE_ENV_FILE }}"

      ############################################
      # 2. LOAD VERSIONS
      ############################################
      - name: Load pinned container versions
        run: grep -E '^[A-Z_]+=' "${{ env.COMPOSE_ENV_FILE }}" >> "$GITHUB_ENV"

      ############################################
      # 3. CACHE NUGET
      ############################################
      - name: Cache NuGet and .NET build outputs
        uses: actions/cache@v6
        with:
          path: |
            .ci-cache/nuget
            .ci-cache/publish
            services/Gateway/bin
            services/Gateway/obj
            services/Users/bin
            services/Users/obj
            services/Users.Tests/bin
            services/Users.Tests/obj
            services/Api/bin
            services/Api/obj
            services/Api.Tests/bin
            services/Api.Tests/obj
            services/Media/bin
            services/Media/obj
            services/Media.Tests/bin
            services/Media.Tests/obj
            services/Chat/bin
            services/Chat/obj
            services/Chat.Tests/bin
            services/Chat.Tests/obj
            services/Location/bin
            services/Location/obj
            services/Location.Tests/bin
            services/Location.Tests/obj
            services/Community/bin
            services/Community/obj
            services/Community.Tests/bin
            services/Community.Tests/obj
            services/Group/bin
            services/Group/obj
            services/Group.Tests/bin
            services/Group.Tests/obj
            services/Social/bin
            services/Social/obj
            services/Social.Tests/bin
            services/Social.Tests/obj
          key: ${{ runner.os }}-dotnet-${{ env.DOTNET_SDK_IMAGE }}-${{ hashFiles('**/*.csproj', 'services/**/*.cs', 'services/**/*.yml', 'services/**/Dockerfile', 'docker/Dockerfile.sdk', 'services/Api.Tests/Fixtures/Harness/**', 'infra/nginx/**', 'clients/web/Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-dotnet-${{ env.DOTNET_SDK_IMAGE }}-
            ${{ runner.os }}-dotnet-

      ############################################
      # 4. DOCKER BUILDX
      ############################################
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      ############################################
      # 5. DOTNET PUBLISH
      ############################################
      - name: Publish Gateway, Users, Media, Chat, Location, Community, Group, and Social; build test projects
        run: |
          mkdir -p .ci-cache/nuget .ci-cache/publish
          bash scripts/ci/dotnet-publish.sh

