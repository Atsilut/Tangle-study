  rust:
    name: Rust worker build and tests
    needs: [changes]
    if: |
      always() && (
        github.event_name != 'pull_request' ||
        needs.changes.outputs.rust == 'true' ||
        needs.changes.outputs.harness == 'true'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:

      ############################################
      # 0. CHECKOUT
      ############################################
      - name: Checkout
        uses: actions/checkout@v7

      ############################################
      # 1. RENDER VERSIONS
      ############################################
      - name: Render pinned container versions
        run: bash scripts/ci/render-versions-env.sh "${{ env.COMPOSE_ENV_FILE }}"

      ############################################
      # 2. LOAD VERSIONS
      ############################################
      - name: Load pinned container versions
        run: grep -E '^[A-Z_]+=' "${{ env.COMPOSE_ENV_FILE }}" >> "$GITHUB_ENV"

      ############################################
      # 3. CACHE CARGO
      ############################################
      - name: Cache Cargo build artifacts
        uses: actions/cache@v6
        with:
          path: |
            .ci-cache/cargo/registry
            .ci-cache/cargo/git
            workers/target
          key: ${{ runner.os }}-cargo-${{ env.RUST_IMAGE }}-${{ hashFiles('workers/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ env.RUST_IMAGE }}-
            ${{ runner.os }}-cargo-

      ############################################
      # 4. RUST TESTS AND RELEASE BUILD
      ############################################
      - name: Run Rust worker tests and release build
        run: |
          mkdir -p .ci-cache/cargo/registry .ci-cache/cargo/git workers/target
          bash scripts/ci/build-workers-release.sh

  web:
    name: Web lint, test, build
    needs: [changes]
    if: |
      always() && (
        github.event_name != 'pull_request' ||
        needs.changes.outputs.web == 'true'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:

      ############################################
      # 0. CHECKOUT
      ############################################
      - name: Checkout
        uses: actions/checkout@v7

      ############################################
      # 1. RENDER VERSIONS
      ############################################
      - name: Render pinned container versions
        run: bash scripts/ci/render-versions-env.sh "${{ env.COMPOSE_ENV_FILE }}"

      ############################################
      # 2. LOAD VERSIONS
      ############################################
      - name: Load pinned container versions
        run: grep -E '^[A-Z_]+=' "${{ env.COMPOSE_ENV_FILE }}" >> "$GITHUB_ENV"

      ############################################
      # 3. CACHE NPM
      ############################################
      - name: Cache npm and web test build
        uses: actions/cache@v6
        with:
          path: |
            .ci-cache/npm
            clients/web/node_modules
          key: ${{ runner.os }}-npm-${{ env.NODE_IMAGE }}-${{ hashFiles('clients/web/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-${{ env.NODE_IMAGE }}-
            ${{ runner.os }}-npm-

      ############################################
      # 4. WEB LINT, TEST, BUILD
      ############################################
      - name: Run web lint, test, and build
        run: |
          mkdir -p .ci-cache/npm
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e npm_config_cache=/npm-cache \
            -v "${{ github.workspace }}:/src" \
            -v "${{ github.workspace }}/.ci-cache/npm:/npm-cache" \
            -w /src/clients/web \
            "${{ env.NODE_IMAGE }}" \
            sh -c "npm ci --no-audit --no-fund && npm run lint && npm run test && npm run build"
          bash scripts/ci/libs/ci-cache.sh

  compose-build:
