      ############################################
      - name: Build and save harness stack images
        run: |
          mkdir -p .ci-cache/nuget .ci-cache/publish .ci-cache/cargo/registry .ci-cache/cargo/git workers/target
          bash scripts/ci/compose-build-stack.sh

      ############################################
      # 7. UPLOAD STACK ARTIFACT
      ############################################
      - name: Upload harness stack artifact
        uses: actions/upload-artifact@v7
        with:
