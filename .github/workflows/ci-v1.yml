      ############################################
      - name: Run media harness E2E
        run: |
          mkdir -p .ci-cache/nuget
          SKIP_PUBLISH=1 SKIP_WORKERS=1 SKIP_COMPOSE_BUILD=1 bash scripts/ci/run-media-harness.sh

  ci-gate:
    name: CI
    needs: [changes, dotnet-build, users-tests, media-tests, chat-tests, location-tests, community-tests, group-tests, social-tests, rust, web, compose-build, harness-media]
    if: always()
    runs-on: ubuntu-latest
    steps:

      ############################################
      # 0. CI GATE
      ############################################
      - name: Fail if any job failed or was cancelled
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "========================================"
          echo "[CI][FAILURE] One or more jobs failed or were cancelled"
          echo "========================================"
          echo "changes:        ${{ needs.changes.result }}"
          echo "dotnet-build:   ${{ needs.dotnet-build.result }}"
          echo "users-tests:    ${{ needs.users-tests.result }}"
          echo "media-tests:    ${{ needs.media-tests.result }}"
          echo "chat-tests:     ${{ needs.chat-tests.result }}"
          echo "location-tests: ${{ needs.location-tests.result }}"
          echo "community-tests:${{ needs.community-tests.result }}"
          echo "group-tests:    ${{ needs.group-tests.result }}"
          echo "social-tests:   ${{ needs.social-tests.result }}"
          echo "rust:           ${{ needs.rust.result }}"
          echo "web:            ${{ needs.web.result }}"
          echo "compose-build:  ${{ needs.compose-build.result }}"
          echo "harness-media:  ${{ needs.harness-media.result }}"
          exit 1
