    if: |
      always() &&
      needs.dotnet-build.result == 'success' &&
      (needs.rust.result == 'success' || needs.rust.result == 'skipped') &&
      (needs.users-tests.result == 'success' || needs.users-tests.result == 'skipped') &&
      (needs.media-tests.result == 'success' || needs.media-tests.result == 'skipped') &&
      (needs.chat-tests.result == 'success' || needs.chat-tests.result == 'skipped') &&
      (needs.location-tests.result == 'success' || needs.location-tests.result == 'skipped') &&
      (needs.community-tests.result == 'success' || needs.community-tests.result == 'skipped') &&
      (needs.group-tests.result == 'success' || needs.group-tests.result == 'skipped') &&
      (needs.social-tests.result == 'success' || needs.social-tests.result == 'skipped') &&
      (
        github.event_name != 'pull_request' ||
        needs.changes.outputs.harness == 'true'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:

      ############################################
      # 0. CHECKOUT
      ############################################
      - name: Checkout
        uses: actions/checkout@v7

      ############################################
      # 1. RENDER VERSIONS
      ############################################
      - name: Render pinned container versions
        run: bash scripts/ci/render-versions-env.sh "${{ env.COMPOSE_ENV_FILE }}"

      ############################################
      # 2. LOAD VERSIONS
      ############################################
      - name: Load pinned container versions
        run: grep -E '^[A-Z_]+=' "${{ env.COMPOSE_ENV_FILE }}" >> "$GITHUB_ENV"

      ############################################
      # 3. CACHE NUGET
      ############################################
      - name: Cache NuGet and .NET build outputs
        uses: actions/cache@v6
        with:
          path: |
            .ci-cache/nuget
            .ci-cache/publish
            services/Gateway/bin
            services/Gateway/obj
            services/Users/bin
            services/Users/obj
            services/Users.Tests/bin
            services/Users.Tests/obj
            services/Api/bin
            services/Api/obj
            services/Api.Tests/bin
            services/Api.Tests/obj
            services/Media/bin
            services/Media/obj
            services/Media.Tests/bin
            services/Media.Tests/obj
            services/Chat/bin
            services/Chat/obj
            services/Chat.Tests/bin
            services/Chat.Tests/obj
            services/Location/bin
            services/Location/obj
            services/Location.Tests/bin
            services/Location.Tests/obj
            services/Community/bin
            services/Community/obj
            services/Community.Tests/bin
            services/Community.Tests/obj
            services/Group/bin
            services/Group/obj
            services/Group.Tests/bin
            services/Group.Tests/obj
            services/Social/bin
            services/Social/obj
            services/Social.Tests/bin
            services/Social.Tests/obj
          key: ${{ runner.os }}-dotnet-${{ env.DOTNET_SDK_IMAGE }}-${{ hashFiles('**/*.csproj', 'services/**/*.cs', 'services/**/*.yml', 'services/**/Dockerfile', 'docker/Dockerfile.sdk', 'services/Api.Tests/Fixtures/Harness/**', 'infra/nginx/**', 'clients/web/Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-dotnet-${{ env.DOTNET_SDK_IMAGE }}-
            ${{ runner.os }}-dotnet-

      ############################################
      # 4. CACHE CARGO
      ############################################
      - name: Cache Cargo build artifacts
        uses: actions/cache@v6
        with:
          path: |
            .ci-cache/cargo/registry
            .ci-cache/cargo/git
            workers/target
          key: ${{ runner.os }}-cargo-${{ env.RUST_IMAGE }}-${{ hashFiles('workers/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ env.RUST_IMAGE }}-
            ${{ runner.os }}-cargo-

      ############################################
      # 5. DOCKER BUILDX
      ############################################
