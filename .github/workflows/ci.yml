name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  COMPOSE_ENV_FILE: docker/versions.prod.env
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  changes:
    name: Detect changed paths
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      rust: ${{ steps.filter.outputs.rust }}
      harness: ${{ steps.filter.outputs.harness }}
    steps:
      - uses: actions/checkout@v7

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'services/**'
              - 'docker/Dockerfile.sdk'
              - 'docker-compose.yml'
              - 'scripts/docker-test.sh'
              - 'scripts/lib/**'
              - 'Tangle.slnx'
            web:
              - 'clients/web/**'
            rust:
              - 'workers/rust-worker/**'
            harness:
              - 'services/Api.Tests/Harness/**'
              - 'services/Api/Domain/Media/**'
              - 'workers/rust-worker/**'
              - 'docker-compose.harness.yml'
              - 'docker-compose.yml'
              - 'scripts/run-media-harness.sh'

  rust:
    name: Rust worker tests
    needs: [changes]
    if: |
      always() && (
        github.event_name != 'pull_request' ||
        needs.changes.outputs.rust == 'true' ||
        needs.changes.outputs.harness == 'true'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Load pinned container versions
        run: grep -E '^[A-Z_]+=' docker/versions.prod.env >> "$GITHUB_ENV"

      - name: Cache Cargo dependencies
        uses: actions/cache@v5
        with:
          path: |
            .ci-cache/cargo/registry
            .ci-cache/cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('workers/rust-worker/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo test
        run: |
          mkdir -p .ci-cache/cargo/registry .ci-cache/cargo/git workers/rust-worker/target
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:/src" \
            -v "${{ github.workspace }}/.ci-cache/cargo/registry:/usr/local/cargo/registry" \
            -v "${{ github.workspace }}/.ci-cache/cargo/git:/usr/local/cargo/git" \
            -v "${{ github.workspace }}/workers/rust-worker/target:/src/workers/rust-worker/target" \
            -w /src/workers/rust-worker \
            "${{ env.RUST_IMAGE }}" \
            cargo test
          sudo chown -R "$(id -u):$(id -g)" .ci-cache/cargo

  web:
    name: Web lint, test, build
    needs: [changes]
    if: |
      always() && (
        github.event_name != 'pull_request' ||
        needs.changes.outputs.web == 'true'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Load pinned container versions
        run: grep -E '^[A-Z_]+=' docker/versions.prod.env >> "$GITHUB_ENV"

      - name: Cache npm downloads
        uses: actions/cache@v5
        with:
          path: .ci-cache/npm
          key: ${{ runner.os }}-npm-${{ hashFiles('clients/web/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: npm ci, lint, test, build
        run: |
          mkdir -p .ci-cache/npm
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e npm_config_cache=/npm-cache \
            -v "${{ github.workspace }}:/src" \
            -v "${{ github.workspace }}/.ci-cache/npm:/npm-cache" \
            -w /src/clients/web \
            "${{ env.NODE_IMAGE }}" \
            sh -c "npm ci --no-audit --no-fund && npm run lint && npm run test && npm run build"
          sudo chown -R "$(id -u):$(id -g)" .ci-cache/npm

  api:
    name: API integration tests
    needs: [changes]
    if: |
      always() && (
        github.event_name != 'pull_request' ||
        needs.changes.outputs.api == 'true'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Load pinned container versions
        run: grep -E '^[A-Z_]+=' docker/versions.prod.env >> "$GITHUB_ENV"

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: .ci-cache/nuget
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'docker/Dockerfile.sdk') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: dotnet test (Testcontainers)
        run: |
          mkdir -p .ci-cache/nuget
          bash scripts/docker-test.sh
          sudo chown -R "$(id -u):$(id -g)" .ci-cache/nuget

  harness:
    name: Media harness E2E
    needs: [changes]
    if: |
      always() && (
        github.event_name != 'pull_request' ||
        needs.changes.outputs.harness == 'true'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Load pinned container versions
        run: grep -E '^[A-Z_]+=' docker/versions.prod.env >> "$GITHUB_ENV"

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: .ci-cache/nuget
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'docker/Dockerfile.sdk') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: run-media-harness.sh
        run: |
          mkdir -p .ci-cache/nuget
          bash scripts/run-media-harness.sh
          sudo chown -R "$(id -u):$(id -g)" .ci-cache/nuget

  ci-gate:
    name: CI
    needs: [changes, rust, web, api, harness]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any job failed or was cancelled
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
