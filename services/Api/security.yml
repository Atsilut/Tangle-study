# JWT signing and validation. Loaded at startup (see Program.cs).
# Replace Secret before any non-Development / non-Docker deployment; the placeholder
# is allowed only in those environments (see JwtStartupValidator).
Jwt:
  Issuer: "Tangle"
  Audience: "TangleClient"
  Secret: "CHANGE_THIS_TO_A_LONG_RANDOM_SECRET_KEY_32+_CHARS"
  ExpiryMinutes: 15
