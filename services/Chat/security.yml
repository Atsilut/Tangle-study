# JWT validation for services/Chat (must match monolith issuer/audience/secret).
# Chat does not issue tokens — login remains on the monolith / future users-service.
#
# Local / Docker Compose:
#   - Use the placeholder Secret below (allowed only in Development/Docker).
#
# Production (Azure CD):
#   - GitHub secret JWT_SECRET → Container App env Jwt__Secret
#   - Overrides this file (see Program.cs: env vars are loaded after YAML).
#   - Must be the same secret the monolith uses so bearer tokens validate.
Jwt:
  Issuer: "Tangle"
  Audience: "TangleClient"
  Secret: "CHANGE_THIS_TO_A_LONG_RANDOM_SECRET_KEY_32+_CHARS"
