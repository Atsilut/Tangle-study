# Harness runs tests inside Compose; API is reached via nginx → gateway.
services:
  gateway:
    ports: !reset []
    depends_on: !override
      users:
        condition: service_healthy
      media:
        condition: service_healthy

  users:
    ports: !reset []
    depends_on: !override
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  media:
    environment:
      # Set by run-media-harness.sh after nginx is up (SAS URLs proxied via /devstoreaccount1).
      Media__PublicBlobEndpoint: ${HARNESS_PUBLIC_BLOB_ENDPOINT:-}

  nginx:
    build:
      args:
        NGINX_CONF: infra/nginx/nginx.harness.conf
    depends_on: !override
      gateway:
        condition: service_healthy
      users:
        condition: service_healthy
      media:
        condition: service_healthy
      rust-worker-media:
        condition: service_started
        required: false
